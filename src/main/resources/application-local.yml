# Local development profile — all requests permitted without JWT.
# Use SPRING_PROFILES_ACTIVE=prod with AZURE_TENANT_ID for Microsoft SSO.
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
  config:
    import: optional:file:.env[.properties]

logging:
  level:
    com.sprinklr.sprintplanning: DEBUG
