# Local development profile — all requests permitted without JWT.
# Use SPRING_PROFILES_ACTIVE=prod with AZURE_TENANT_ID for Microsoft SSO.
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
  config:
    import: optional:file:.env[.properties]

# logging:
#   level:
#     com.sprinklr.sprintplanning: DEBUG
    
logging:
  level:
    com.sprinklr.sprintplanning: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: TRACE
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerAdapter: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.filter: DEBUG