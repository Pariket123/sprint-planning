spring:
  application:
    name: sprint-planning
  profiles:
    active: local
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/sprint-planning}

jira:
  base-url: ${JIRA_BASE_URL:https://your-org.atlassian.net}
  email: ${JIRA_EMAIL:}
  api-token: ${JIRA_API_TOKEN:}
  retry:
    max-attempts: 3
    initial-interval-ms: 500
    multiplier: 2.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

planning:
  domain-imbalance-threshold: 0.6
  high-utilization-threshold: 0.9
  medium-utilization-threshold: 0.75
